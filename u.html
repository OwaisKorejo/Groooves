<!DOCTYPE html>                                           
  <html lang="en">                                                 
  <head>                                                          
    <meta charset="utf-8" />                                       
    <meta name="viewport" content="width=device-width,             
  initial-scale=1" />                       
      
    <title>A Groooves profile</title>                                
  <meta property="og:title" content="Groooves Profile" />        
  <meta property="og:description" content="Tap to view this profile
   in Groooves" />                                                 
  <meta property="og:type" content="profile" />               
    <script>
      // iOS Safari shows its native "Open in the Groooves app" banner at the top
      // of the page when this meta tag is present. Tapping it opens the app
      // (deep-linked to this profile) or the App Store if it isn't installed.
      // Injected here in <head> so Safari sees it while the page is still loading.
      (function () {
        var u = decodeURIComponent(location.pathname.replace(/^\/u\//, ''));
        var m = document.createElement('meta');
        m.name = 'apple-itunes-app';
        m.content = 'app-id=6749868967, app-argument=https://www.groooves.app/u/' + u;
        document.head.appendChild(m);
      })();
    </script>
    <style>                                                        
      body { font-family: -apple-system, system-ui, sans-serif;
  background: #191919; color: #fff; margin: 0; padding: 24px;      
  display: flex; flex-direction: column; align-items: center;    
  justify-content: center; min-height: 100vh; }                    
      h1 { font-size: 24px; margin: 0 0 8px; }                     
      p { color: #888; margin: 0 0 32px; }                       
      a { display: inline-block; padding: 14px 28px; background:   
  #bf8cff; color: #1a1a1a; border-radius: 999px; text-decoration:
  none; font-weight: 600; margin: 8px; }                           
      .secondary { background: #2a2a2a; color: #ccc; }
      .hint { display: none; max-width: 320px; margin: 20px 0 0;
  font-size: 14px; line-height: 1.5; color: #aaa; }
      .hint b { color: #fff; }
      .banner { display: none; max-width: 340px; margin: 0 0 24px;
  padding: 12px 16px; background: #241f2e; border: 1px solid #bf8cff55;
  border-radius: 12px; font-size: 14px; line-height: 1.5; color: #e8d9ff; }
      .banner b { color: #fff; }             
    </style>                                                       
  </head>                                                          
  <body>                                                           
    <div class="banner" id="banner"></div>
    <h1>@<span id="username">user</span></h1>                      
    <p>View this profile in Groooves</p>                           
    <a id="open" href="#">Open in App</a>                          
    <a class="secondary"                                           
  href="https://apps.apple.com/us/app/groooves/id6749868967">Get the App</a>
    <p class="hint" id="hint">Didn't open? Open this page in your browser first &mdash;
  use this app's menu (look for <b>"Open in browser"</b>,
  <b>"Open in Chrome"</b>/<b>"Safari"</b>, or a <b>&#8226;&#8226;&#8226;</b> /
  share icon), then tap <b>Open in App</b> again.</p> 
    <script>                                                       
      var u =                                                      
  decodeURIComponent(location.pathname.replace(/^\/u\//, ''));     
      document.getElementById('username').textContent = u;         
      document.getElementById('open').href =                       
  'https://www.groooves.app/u/' + u;

      // In-app browsers (Instagram, TikTok, Facebook, etc.) block universal
      // links, so the app won't open from here. Detect them and guide the
      // user to a real browser, where the link works normally.
      var ua = navigator.userAgent || '';
      var inAppApps = ['Instagram', 'FBAN', 'FBAV', 'FB_IAB', 'Messenger',
  'Twitter', 'Line', 'MicroMessenger', 'TikTok', 'musical_ly',
  'BytedanceWebview', 'Snapchat', 'LinkedInApp', 'Pinterest', 'GSA/',
  '; wv'];
      var inApp = inAppApps.some(function (name) {
        return ua.indexOf(name) !== -1;
      });

      var open = document.getElementById('open');
      var hint = document.getElementById('hint');
      var banner = document.getElementById('banner');

      // In-app browsers (Instagram, TikTok, ...) can't reach the app through a
      // universal link, so a tap would just load the web page and wipe the
      // guidance off screen. Keep the tap on this page and show the hint.
      // Normal browsers just follow the "Open in App" link -- and on iOS Safari
      // the native "Open in the Groooves app" banner (added in <head>) sits at
      // the top as the easy way in.
      if (inApp) {
        open.addEventListener('click', function (e) {
          e.preventDefault();
          hint.style.display = 'block';
        });
      }

      // If we're already inside an in-app browser, warn up front.
      if (inApp) {
        banner.innerHTML = "You're viewing this inside another app. " +
          'To open Groooves, first open this page in your browser &mdash; ' +
          'use this app\'s menu (e.g. <b>"Open in browser"</b> or the ' +
          '<b>&#8226;&#8226;&#8226;</b> / share icon), then tap ' +
          '<b>Open in App</b>.';
        banner.style.display = 'block';
      }                               
    </script>                                                      
  </body>                                                          
  </html>
