<html lang="en">
<head>
  <meta charset="UTF-8" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Groooves",
    "alternateName": "Groooves App",
    "url": "https://groooves.app/"
  }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { height: 100%; margin: 0; }
    body {
      min-height: 100%;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, Avenir, Helvetica, Arial, sans-serif;
      color: rgba(255, 255, 255, 0.87);
      background-color: #191919;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      position: relative;
      padding: 36px 0;
    }
    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -30vmax;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      background:
        radial-gradient(circle at 20% 20%, rgba(137, 43, 226, 0.45), transparent 45%),
        radial-gradient(circle at 80% 25%, rgba(0, 191, 255, 0.4), transparent 42%),
        radial-gradient(circle at 50% 85%, rgba(255, 0, 128, 0.28), transparent 48%);
      filter: blur(50px) saturate(115%);
      animation: driftGlow 12s ease-in-out infinite alternate;
    }
    body::after {
      background:
        radial-gradient(circle at 70% 65%, rgba(34, 211, 238, 0.22), transparent 44%),
        radial-gradient(circle at 35% 60%, rgba(167, 139, 250, 0.3), transparent 42%);
      filter: blur(72px);
      mix-blend-mode: screen;
      animation: pulseGlow 8s ease-in-out infinite;
    }
    @keyframes driftGlow {
      0%   { transform: translate3d(-8%, -6%, 0) scale(1) rotate(-3deg); }
      100% { transform: translate3d(9%, 7%, 0) scale(1.14) rotate(4deg); }
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.35; transform: translate3d(-5%, 3%, 0) scale(0.95) rotate(-2deg); }
      50%      { opacity: 0.78; transform: translate3d(7%, -4%, 0) scale(1.2) rotate(3deg); }
    }

    @font-face { font-family: "EuropaBold"; src: url("assets/fonts/europa.otf") format("woff2"); }
    @font-face { font-family: "Regular"; src: url("assets/fonts/metropolis.otf") format("opentype"); }
    @font-face { font-family: "Buttoner"; src: url("assets/fonts/ok.otf") format("opentype"); }

    /* Entrance animation */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim {
      opacity: 0;
      animation: fadeInUp 0.75s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    #root {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1rem;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    /* ── Logo ── */
    .logo {
      height: 120px;
      transition: filter 300ms;
    }
    .logo:hover {
      filter: drop-shadow(0 0 32px #646cffaa);
    }

    /* ── Carousel ── */
    .carousel {
      width: 220px;
      margin: 32px auto 10px;
      overflow: hidden;
      border-radius: 24px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5),
                  0 0 80px rgba(137, 43, 226, 0.12);
    }
    .carousel-track {
      display: flex;
      width: 500%;
      transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
      will-change: transform;
    }
    .carousel-track img {
      width: 20%;
      flex-shrink: 0;
      display: block;
    }
    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 14px;
    }
    .carousel-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      transition: background 0.4s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
    }
    .carousel-dots span.active {
      background: rgba(255, 255, 255, 0.9);
      transform: scale(1.4);
    }

    /* ── Typography ── */
    h1 {
      font-family: "EuropaBold";
      font-size: 90px;
      margin: 4px 0 0;
    }
    p.tagline {
      font-family: "Regular";
      font-size: 16px;
      margin: 6px 0 0;
      opacity: 0.85;
    }

    /* ── Buttons ── */
    .card {
      padding: 24px 0 0;
      margin-top: 2px;
    }
    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      border-radius: 50px;
      padding: 18px 44px;
      font-size: 16px;
      font-family: "Buttoner";
      background-color: #f2f4fb;
      border: 1px solid #d7dcec;
      text-decoration: none;
      color: #1f2430;
      cursor: pointer;
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1),
                  background-color 0.3s ease,
                  box-shadow 0.35s ease;
    }
    a.button:hover {
      transform: scale(1.05);
      background-color: #ffffff;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
    }
    a.button:active {
      transform: scale(0.97);
      transition-duration: 0.1s;
    }
    .button svg.icon {
      width: 24px;
      height: 24px;
      vertical-align: middle;
      display: inline-block;
      margin-right: 8px;
      fill: #1f2430;
    }

    /* ── Social ── */
    .social-icons {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 14px;
    }
    .social-icons a {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background-color: #e7eaf3;
      color: #1f2430;
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1),
                  box-shadow 0.35s ease;
      text-decoration: none;
    }
    .social-icons a:hover {
      transform: scale(1.15);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
    }
    .social-icons a:active {
      transform: scale(0.92);
      transition-duration: 0.1s;
    }

    /* ── Footer ── */
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 24px;
    }
    .footer-links a {
      font-family: Buttoner;
      color: white;
      text-decoration: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .footer-links a:hover {
      opacity: 0.7;
      transform: translateY(-1px);
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      h1 { font-size: 70px; }
      .logo { height: 100px; }
    }
    @media (max-width: 480px) {
      h1 { font-size: 56px; }
      .logo { height: 80px; }
      .carousel { width: 200px; }
      a.button { padding: 16px 36px; font-size: 15px; }
    }
    @media (prefers-color-scheme: light) {
      html, body { color: rgba(255,255,255,0.87); background-color: #121212; }
    }
  </style>
</head>
<body>
  <div id="root">
    <img src="./assets/images/logo_no_background.png" class="logo anim" style="animation-delay:0s" alt="Groooves logo" />
    <h1 class="anim" style="animation-delay:0.06s">groooves</h1>
    <p class="tagline anim" style="animation-delay:0.12s">rate, review and track your favourite music.</p>

    <div class="card anim" style="animation-delay:0.18s">
      <a class="button" href="https://apps.apple.com/us/app/groooves/id6749868967" target="_blank" rel="noreferrer">
        <svg class="icon" viewBox="0 0 384 512">
          <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.9-44.6-35.5-2.8-74 20.7-88.1 20.7-14.5 0-48.1-19.7-74.4-19.7C61.1 140.3 0 184.8 0 273.5c0 25.7 4.7 52.3 14 79.8 12.4 36.7 57.3 126.7 104.2 125.2 24.5-.6 41.7-17.3 73.5-17.3 31.3 0 47.2 17.3 74.4 17.3 47.3-.7 89.7-82 101.6-118.9-64.4-30-48.9-90.5-48.9-90.9zM255.3 91.1c26.5-31.4 24.1-60.1 23.3-70.1-23.3 1.3-50.3 15.8-65.9 33.8-17.1 19.7-27 43.5-24.9 69.2 26.1 2 49.9-11.3 67.5-32.9z"/>
        </svg>

      </a>
      <br><br>
      <a class="button" href="https://play.google.com/store/apps/details?id=com.owaiskorejo.Grooves" target="_blank" rel="noreferrer">
        <svg class="icon" viewBox="0 0 576 512">
          <path d="M420.55,301.93a24,24,0,1,1,24-24,24,24,0,0,1-24,24m-265.1,0a24,24,0,1,1,24-24,24,24,0,0,1-24,24m273.7-144.48,47.94-83a10,10,0,1,0-17.27-10h0l-48.54,84.07a301.25,301.25,0,0,0-246.56,0L116.18,64.45a10,10,0,1,0-17.27,10h0l47.94,83C64.53,202.22,8.24,285.55,0,384H576c-8.24-98.45-64.54-181.78-146.85-226.55"/>

    <div class="carousel anim" style="animation-delay:0.28s">
      <div class="carousel-track" id="carouselTrack">
        <img src="./assets/mockups/pic-1.png" alt="App screenshot 1" />
        <img src="./assets/mockups/pic-2.png" alt="App screenshot 2" />
        <img src="./assets/mockups/pic-3.png" alt="App screenshot 3" />
        <img src="./assets/mockups/pic-4.png" alt="App screenshot 4" />
        <img src="./assets/mockups/pic-5.png" alt="App screenshot 5" />

    <div class="carousel-dots anim" style="animation-delay:0.32s" id="carouselDots">
      <span class="active" data-index="0"></span>

      </a>
    </div>
    <div class="footer-links anim" style="animation-delay:0.42s">
      <a href="privacy-policy.html">Privacy Policy</a>
      <a href="faq.html">FAQ</a>
      <a href="user-guide.html">User Guide</a>
    </div>
  </div>

  <script>
    (function() {
      var track = document.getElementById('carouselTrack');
      var dots = document.querySelectorAll('#carouselDots span');
      var current = 0;
      var timer;

      function goTo(i) {
        current = i;
        track.style.transform = 'translateX(-' + (current * 20) + '%)';
        for (var d = 0; d < dots.length; d++) {
          dots[d].classList.toggle('active', d === current);
        }
      }

      function next() {
        goTo((current + 1) % 5);
      }

      function startAutoplay() {
        timer = setInterval(next, 3200);
      }

      for (var i = 0; i < dots.length; i++) {
        dots[i].addEventListener('click', (function(idx) {
          return function() {
            clearInterval(timer);
            goTo(idx);
            startAutoplay();
          };
        })(i));
      }

      startAutoplay();
    })();
  </script>

</html>
