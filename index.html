<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="./assets/images/logo_no_background.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Groooves</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, Avenir, Helvetica, Arial, sans-serif;
      color: rgba(255, 255, 255, 0.87);
      background-color: #191919;
      font-smoothing: antialiased;
      overflow: hidden;
      position: relative;
    }
    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -30vmax;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      background:
        radial-gradient(circle at 20% 20%, rgba(137, 43, 226, 0.45), transparent 45%),
        radial-gradient(circle at 80% 25%, rgba(0, 191, 255, 0.4), transparent 42%),
        radial-gradient(circle at 50% 85%, rgba(255, 0, 128, 0.28), transparent 48%);
      filter: blur(50px) saturate(115%);
      animation: driftGlow 12s ease-in-out infinite alternate;
    }
    body::after {
      background:
        radial-gradient(circle at 70% 65%, rgba(34, 211, 238, 0.22), transparent 44%),
        radial-gradient(circle at 35% 60%, rgba(167, 139, 250, 0.3), transparent 42%);
      filter: blur(72px);
      mix-blend-mode: screen;
      animation: pulseGlow 8s ease-in-out infinite;
    }
    @keyframes driftGlow {
      0% {
        transform: translate3d(-8%, -6%, 0) scale(1) rotate(-3deg);
      }
      100% {
        transform: translate3d(9%, 7%, 0) scale(1.14) rotate(4deg);
      }
    }
    @keyframes pulseGlow {
      0%, 100% {
        opacity: 0.35;
        transform: translate3d(-5%, 3%, 0) scale(0.95) rotate(-2deg);
      }
      50% {
        opacity: 0.78;
        transform: translate3d(7%, -4%, 0) scale(1.2) rotate(3deg);
      }
    }
    @font-face {
      font-family: "EuropaBold";
      src: url("assets/fonts/europa.otf") format("woff2");
    }
    @font-face {
      font-family: "Regular";
      src: url("assets/fonts/metropolis.otf") format("opentype");
    }
    @font-face {
      font-family: "Buttoner";
      src: url("assets/fonts/ok.otf") format("opentype");
    }
    #root {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1rem;
      text-align: center;
      box-sizing: border-box;
      position: relative;
      z-index: 1;
    }
    .logo {
      height: 140px;
      transition: filter 300ms;
    }
    .logo:hover {
      filter: drop-shadow(0 0 32px #646cffaa);
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 30px;
    }
    .footer-links a {
      font-family: Buttoner;
      color: white;
      text-decoration: none;
    }
    h1 {
      font-family: "EuropaBold";
      font-size: 100px;
      margin: 5px;
    }
    @media (max-width: 768px) {
      h1 { font-size: 80px; }
    }
    @media (max-width: 480px) {
      h1 { font-size: 60px; }
      .logo { height: 100px; }
    }
    p {
      font-family: "Regular";
      font-size: 16px;
      margin-top: 15px;
    }
    .card {
      padding: 32px 0 0 0;
      margin-top: 10px;
    }
    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      border-radius: 50px;
      padding: 20px 50px;
      font-size: 16px;
      font-family: "Buttoner";
      background-color: #f2f4fb;
      border: 1px solid #d7dcec;
      text-decoration: none;
      color: #1f2430;
      cursor: pointer;
      transition: transform 0.25s, background-color 0.25s;
    }
    a.button:hover {
      transform: scale(1.05);
      background-color: #ffffff;
    }
    .button svg.icon {
      width: 26px;
      height: 26px;
      vertical-align: middle;
      display: inline-block;
      margin-right: 8px;
      fill: #1f2430;
    }
    .social-icons {
      margin-top: 40px;
      display: flex;

      justify-content: center;
      gap: 16px;
    }
    .social-icons a {
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 25px;
      background-color: #e7eaf3;
      color: #1f2430;
      transition: transform 0.2s;
      text-decoration: none;
    }
    .social-icons a:hover {
      transform: scale(1.1);
    }
    @media (prefers-color-scheme: light) {
      html, body {
        color: rgba(255,255,255,0.87);
        background-color: #121212;
      }
      .button {
        background-color: #f2f4fb;
        color: #1f2430;
      }
      .social-icons a {
        background-color: #e7eaf3;
        color: #1f2430;
      }
    }
  </style>
</head>

</body>
